name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pre-deploy checks
        run: node scripts/pre-deploy-check.cjs

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Deploy job - handles both dev (main) and release (tags)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          path: gh-pages-content

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./dist

      - name: Prepare deployment for dev (main branch pushes)
        if: github.ref == 'refs/heads/main'
        run: |
          # Copy existing gh-pages content (preserves root release)
          cp -r gh-pages-content/* . 2>/dev/null || true
          cp -r gh-pages-content/.[!.]* . 2>/dev/null || true
          
          # Update dev folder with new build
          rm -rf dev
          mkdir -p dev
          cp -r dist/* dev/
          
          # Clean up
          rm -rf gh-pages-content dist

      - name: Prepare deployment for release (version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Copy existing gh-pages content (preserves dev folder)
          cp -r gh-pages-content/* . 2>/dev/null || true
          cp -r gh-pages-content/.[!.]* . 2>/dev/null || true
          
          # Update root with new release build
          # Keep dev folder, .nojekyll, etc.
          rm -f index.html favicon.svg icons.svg
          rm -rf assets
          cp -r dist/* .
          
          # Clean up
          rm -rf gh-pages-content dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pre-deploy checks
        run: node scripts/pre-deploy-check.cjs

      - name: Build
        run: npm run build

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy-staging
          
          # For main branch: fetch existing root, then add dev/ folder
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Clone existing gh-pages to preserve root
            git clone --depth 1 https://github.com/${{ github.repository }}.git deploy-staging
            cd deploy-staging
            git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
            cd ..
            mkdir -p deploy-staging/dev
            cp -r dist/* deploy-staging/dev/
            echo "Deploying to dev/ (preserving root)"
          fi
          
          # For tags (releases): deploy to root only (stable release)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            cp -r dist/* deploy-staging/
            echo "Deploying to root (stable release ${{ github.ref_name }})"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy-staging

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

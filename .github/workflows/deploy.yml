name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pre-deploy checks
        run: node scripts/pre-deploy-check.cjs

      - name: Build
        run: npm run build

      - name: Prepare deployment structure
        run: |
          # Create staging directory
          mkdir -p deploy-staging
          
          # For main branch: include dev/ folder
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            mkdir -p deploy-staging/dev
            cp -r dist/* deploy-staging/dev/
            # Also keep existing root files by fetching gh-pages
            git fetch origin gh-pages
            git checkout gh-pages -- . 2>/dev/null || true
            # Copy existing root files (except dev folder)
            for f in index.html favicon.svg icons.svg assets; do
              if [ -e "$f" ] && [ "$f" != "dev" ]; then
                cp -r "$f" deploy-staging/ 2>/dev/null || true
              fi
            done
            # Remove dev from fetched content (we already have new one)
            rm -rf deploy-staging/dev 2>/dev/null || true
            mkdir -p deploy-staging/dev
            cp -r dist/* deploy-staging/dev/
          fi
          
          # For tags: deploy to root
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            cp -r dist/* deploy-staging/
            # Keep existing dev folder
            git fetch origin gh-pages
            git checkout gh-pages -- dev 2>/dev/null || true
            if [ -d "dev" ]; then
              cp -r dev deploy-staging/
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy-staging

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

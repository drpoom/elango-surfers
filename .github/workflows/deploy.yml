name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pre-deploy checks
        run: node scripts/pre-deploy-check.cjs

      - name: Build
        run: npm run build

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy-staging
          
          # TAG DEPLOYMENT (stable release): Deploy to ROOT only
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "📦 Tag deployment: ${{ github.ref_name }} → ROOT"
            cp -r dist/* deploy-staging/
            echo "✅ Root deployment prepared"
          
          # MAIN BRANCH DEPLOYMENT (dev): Deploy to DEV/ only, preserve ROOT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "🔧 Main branch deployment → DEV/ only"
            
            # Clone existing gh-pages to preserve root content
            echo "📥 Fetching existing gh-pages branch..."
            if git clone --depth 1 --branch gh-pages \
              https://github.com/${{ github.repository }}.git deploy-staging 2>&1; then
              echo "✅ Cloned gh-pages successfully"
            else
              echo "⚠️ Clone failed, creating fresh deploy-staging"
              rm -rf deploy-staging
              mkdir -p deploy-staging
            fi
            
            # Add dev/ folder with new build
            echo "📦 Adding dev/ folder..."
            mkdir -p deploy-staging/dev
            cp -r dist/* deploy-staging/dev/
            
            echo "✅ Dev deployment prepared"
            echo "📋 Root preserved: $(ls deploy-staging/ | grep -v dev | wc -l) items"
            echo "📋 Dev folder: $(ls deploy-staging/dev/ | wc -l) items"
          fi
          
          echo "📋 Final deployment structure:"
          ls -la deploy-staging/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy-staging

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

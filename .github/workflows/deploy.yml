name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pre-deploy checks
        run: node scripts/pre-deploy-check.cjs

      - name: Build
        run: npm run build

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch
          fetch-depth: 0

      - name: Deploy dev folder (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          cd gh-pages-branch
          # Remove old dev folder
          rm -rf dev
          # Copy new build to dev folder
          mkdir -p dev
          cp -r ../dist/* dev/
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit and push
          git add -f dev/
          if ! git diff --staged --quiet; then
            git commit -m "deploy(dev): latest build from main [skip ci]"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi

      - name: Deploy root (version tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd gh-pages-branch
          # Keep dev folder, update root files
          # Remove old root files
          rm -f index.html favicon.svg icons.svg
          rm -rf assets dist
          # Copy new build to root
          cp -r ../dist/* .
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit and push (excluding dev folder from this commit)
          git add -f index.html favicon.svg icons.svg assets
          if ! git diff --staged --quiet; then
            git commit -m "deploy(release): ${{ github.ref_name }}"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi
